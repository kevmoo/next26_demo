name: multi_counter_server
publish_to: none
resolution: workspace

environment:
  sdk: ^3.10.0

dependencies:
  dart_firebase_admin:
  dart_jsonwebtoken: ^3.1.1
  firebase_functions: any
  google_cloud_firestore:
  multi_counter_shared: any # workspace

dev_dependencies:
  build_runner: ^2.4.0
  http: ^1.2.2

dependency_overrides:
  dart_firebase_admin:
    git:
      url: https://github.com/invertase/dart_firebase_admin
      path: packages/dart_firebase_admin

  firebase_functions:
    git:
      url: https://github.com/invertase/firebase_functions

  google_cloud_firestore:
    git:
      url: https://github.com/invertase/dart_firebase_admin
      path: packages/google_cloud_firestore
