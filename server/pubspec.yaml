name: next26_server
publish_to: none
resolution: workspace

environment:
  sdk: ^3.10.0

dependencies:
  dart_firebase_admin:
  firebase_functions: any
  googleapis_firestore:
  next26_shared: any # workspace

dev_dependencies:
  build_runner: ^2.4.0
  http: ^1.2.2

dependency_overrides:
  dart_firebase_admin:
    git:
      url: https://github.com/invertase/dart_firebase_admin
      ref: next
      path: packages/dart_firebase_admin

  firebase_functions:
    git:
      url: https://github.com/invertase/firebase_functions.git

  googleapis_firestore:
    git:
      url: https://github.com/invertase/dart_firebase_admin.git
      ref: next
      path: packages/googleapis_firestore
  googleapis_storage:
    git:
      url: https://github.com/invertase/dart_firebase_admin.git
      ref: next
      path: packages/googleapis_storage
