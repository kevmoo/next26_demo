name: sell_stuff_server
publish_to: none
resolution: workspace

environment:
  sdk: ^3.10.0

dependencies:
  dart_jsonwebtoken: ^3.1.1
  firebase_admin_sdk: any # not published yet
  firebase_functions: any # not published yet
  genkit: ^0.12.0
  genkit_google_genai: ^0.2.3
  google_cloud_firestore: any # not published yet
  google_cloud_storage: ^0.6.0
  sell_stuff_shared: any # workspace

dev_dependencies:
  build_runner: ^2.4.0
  http: ^1.2.2

dependency_overrides:
  firebase_admin_sdk:
    git:
      url: https://github.com/firebase/firebase-admin-dart
      path: packages/firebase_admin_sdk

  firebase_functions:
    git:
      url: https://github.com/firebase/firebase-functions-dart

  google_cloud_firestore:
    git:
      url: https://github.com/firebase/firebase-admin-dart
      path: packages/google_cloud_firestore
