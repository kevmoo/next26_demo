specVersion: v1alpha1
requiredAPIs:
  - api: cloudfunctions.googleapis.com
    reason: Required for Cloud Functions
endpoints:
  create-listing:
    platform: gcfv2
    region:
      - us-central1
    callableTrigger: {}
    baseImageUri: us-central1-docker.pkg.dev/serverless-runtimes/google-22-full/runtimes/go123
    command:
      - ./bin/server
    entryPoint: create-listing
  edit-listing:
    platform: gcfv2
    region:
      - us-central1
    callableTrigger: {}
    baseImageUri: us-central1-docker.pkg.dev/serverless-runtimes/google-22-full/runtimes/go123
    command:
      - ./bin/server
    entryPoint: edit-listing
